name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: lsb
          POSTGRES_PASSWORD: lsb_dev_password
          POSTGRES_DB: lsb_dev
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      LSB_DB_HOST: localhost
      LSB_DB_PORT: 5432
      LSB_DB_NAME: lsb_dev
      LSB_DB_USER: lsb
      LSB_DB_PASSWORD: lsb_dev_password
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Apply migrations
        run: python scripts/apply_migrations.py
      - name: Unit tests
        run: pytest -q tests
      - name: Golden-fixture replay
        run: |
          if find tests/fixtures/golden -type f ! -name .gitkeep | grep -q .; then
            echo "CI FAILED: golden fixtures exist but the replay runner is not wired yet"
            exit 1
          else
            echo "No golden fixtures yet (expected before Session A8) - skipping."
          fi
