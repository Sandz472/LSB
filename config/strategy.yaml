# LSB universal strategy parameters
# Source of truth: LSB System Requirements v2.0 §5.1 / §6.1.1 / §7.1.1 / §7.2 / §8.1
# These constants are the same for all 4 instruments.
# Folded into config_hash alongside InstrumentConfig (namespaced as StrategyParams).
# All thresholds read from here — never hard-coded in gate functions (CLAUDE.md rule 1).

# EMA periods (§5.1)
ema_fast: 21
ema_mid: 50
ema_slow: 89
atr_period: 14

# Gate 1 — macro-trend thresholds, D1 ATR-relative (ADR-006, §4.1.2, §5.2)
ema_compression_atr_mult: "0.10"    # |EMA21−EMA89| < ATR×0.10 → INVALID (§5.2)
ema_slope_atr_mult: "0.05"          # per-bar slope threshold (§4.1.2)
slope_lookback: 3                   # bars over which slope is measured (§4.1.2 "over 3 candles")
ema_cross_lookback: 3               # recent-cross blocker window

# Gate 2 — structure / ascending triangle (§6.1.1)
resistance_min_touches: 2           # ≥2 swing highs within ±flat_tolerance
rising_low_min_pct: "0.20"          # each higher low ≥0.20% above prior
triangle_min_candles: 8             # duration floor (H4 bars)
triangle_max_candles: 60            # duration cap
compression_max_ratio: "0.60"       # last candle range / first candle range
apex_proximity_lo: "0.75"           # 75–95% of way to convergence apex
apex_proximity_hi: "0.95"
invalidation_break_pct: "0.30"      # close >0.30% beyond resistance → INVALIDATED

# Gate 3 — liquidity sweep (§7.1.1, §7.2)
block_min_touches: 2                # ≥2 touches to form the block
sweep_expiry_candles: 3             # sweep must be within last N H1 candles
