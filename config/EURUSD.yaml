# EURUSD per-instrument configuration
# Source of truth: docs/GATE_SPECIFICATION.md "Per-instrument configuration"
# Values are spec §6.1.1 / §7.1.1 / §7.2 / §9.1 / §3.3 baselines.

instrument: EURUSD
instrument_class: fx_major
pip_size: "0.0001"
max_spread: "1.5"
max_spread_unit: pips
sessions: fx
flat_tolerance: "0.15"      # pct baseline §6.1.1 (configurable sweep variable)
sweep_penetration: "2"
sweep_pen_unit: pips
block_min_width: "5"
block_width_unit: pips
stop_buffer: "2"            # normal ATR state §9.1
stop_buffer_elev: "4"       # elevated ATR state §9.1
stop_buffer_unit: pips
data_source: dukascopy
swing_lookback: 2        # ADR-005: fractal pivot half-width (5-bar fractal)
ema_touch: "3"           # Gate 4 §8.1#4: EMA-interaction tolerance
ema_touch_unit: pips
