schema_version: 5
instrument: XAUUSD
display_name: "Gold / US Dollar"
asset_class: fx          # fx | synthetic | crypto
timeframes: [H1]
pip_size: 0.01
contract_size: 100

broker_costs:
  spread_points: 25.0
  slippage_atr_mult: 0.08
  commission_per_lot: 7.0
  swap_long_points: -6.0
  swap_short_points: -1.0

walkforward:
  train_months: 18
  test_months: 6

# Signal/gate parameters — spec defaults from LSB_System_Requirements_v2.0.md §16 / Appendix A.
signals:
  ema_short_period: 21
  ema_mid_period: 50
  ema_long_period: 89
  ema_slope_lookback: 3
  atr_period: 14
  atr_elevated_multiplier: 1.25
  atr_extreme_multiplier: 2.0
  ema_compression_atr_mult: 0.10
  slope_threshold_atr_mult: 0.05
  triangle_min_candles: 8
  triangle_max_candles: 60
  triangle_flat_tolerance_pct: 0.005
  swing_lookback: 2
  apex_proximity_min: 0.75
  apex_proximity_max: 0.95
  block_min_touches: 2
  block_min_width_pips: 5.0
  sweep_penetration_pips: 2.0
  sweep_expiry_candles: 3
  sweep_score_min: 50
  # Gate 5–8 parameters (Session A5; spec defaults — tune only after walk-forward)
  rejection_wick_body_mult: 2.0
  allowed_atr_states: [NORMAL, ELEVATED]
  max_spread_pips: 50.0    # XAUUSD: pips at $0.01/pip; 50 pips = $0.50 cap
  session_edge_buffer_min: 30
  min_rr_ratio: 2.5
  sl_buffer_pips: 2.0
  sl_buffer_pips_elevated: 4.0
  # Pyramiding — ADR-003 defaults (owner decision, not in spec)
  pyramid_enabled: false
  pyramid_max_legs: 3
  pyramid_add_at_r: 1.0
  pyramid_same_direction_only: true
