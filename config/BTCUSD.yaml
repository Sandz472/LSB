schema_version: 5
instrument: BTCUSD
display_name: "Bitcoin / US Dollar"
asset_class: crypto       # fx | synthetic | crypto
timeframes: [H1]
pip_size: 1.0             # Dukascopy encodes BTC as integer/10 (verified 2026-06-17: ~$63,500 range)
contract_size: 1

broker_costs:
  spread_points: 30.0     # first-pass estimate; verify against broker spec at Session A7
  slippage_atr_mult: 0.10
  commission_per_lot: 0.0
  swap_long_points: 0.0
  swap_short_points: 0.0

walkforward:
  train_months: 18
  test_months: 6

# Signal/gate parameters. For crypto, block_min_width_pips and sweep_penetration_pips are
# interpreted by the engine as percentage × price / pip_size (see signals/liquidity.py).
# Values below represent spec §7 thresholds: 0.05% width → stored as 0.05, 0.02% penetration.
# Tune after walk-forward; never share params across synthetic and conventional instruments.
signals:
  ema_short_period: 21
  ema_mid_period: 50
  ema_long_period: 89
  ema_slope_lookback: 3
  atr_period: 14
  atr_elevated_multiplier: 1.25
  atr_extreme_multiplier: 2.0
  ema_compression_atr_mult: 0.10
  slope_threshold_atr_mult: 0.05
  triangle_min_candles: 8
  triangle_max_candles: 60
  triangle_flat_tolerance_pct: 0.005
  swing_lookback: 2
  apex_proximity_min: 0.75
  apex_proximity_max: 0.95
  block_min_touches: 2
  block_min_width_pips: 0.05   # interpreted as 0.05% for crypto (see signals/liquidity.py)
  sweep_penetration_pips: 0.02  # interpreted as 0.02% for crypto
  sweep_expiry_candles: 3
  sweep_score_min: 50
  # Gate 5–8 parameters (Session A5; spec defaults — tune only after walk-forward)
  rejection_wick_body_mult: 2.0
  allowed_atr_states: [NORMAL, ELEVATED]
  max_spread_pips: 100.0   # BTCUSD: pips at $1/pip; 100 pips = $100 cap
  session_edge_buffer_min: 30
  min_rr_ratio: 2.5
  sl_buffer_pips: 2.0
  sl_buffer_pips_elevated: 4.0
  # Pyramiding — ADR-003 defaults (owner decision, not in spec)
  pyramid_enabled: false
  pyramid_max_legs: 3
  pyramid_add_at_r: 1.0
  pyramid_same_direction_only: true
